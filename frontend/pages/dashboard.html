<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/forms.css" />
  <link rel="stylesheet" href="../styles/dashboard.css" />
  <link rel="stylesheet" href="../styles/subject-card.css"/>
  <link rel="stylesheet" href="../styles/toast.css" />
  <link rel="stylesheet" href="../styles/share-code.css" />
  <link rel="stylesheet" href="../styles/class.css" />
  <script src="../scripts/toast.js"></script>
</head>
<body>
  <a class="btn-card-action btn-home" href="../index.html">Inicio</a>
  <nav class="dashboard-nav">
    <button class="btn-primary" id="btn-open-modal" style="display:none">+ Crear clase</button>
    <button class="btn-primary" id="btn-join-class" style="display:none">+ Unirse a clase</button>
  </nav>

  <div class="page-container">
    <div class="divider" id="divider-line"></div>
    <div class="classes-list" id="classes-list"></div>
  </div>
  <div class="modal-overlay" id="create-subject-modal">
    <div class="form-card">
      <div class="form-header">
        <h1 class="form-title">Crear Clase</h1>
        <p class="form-subtitle">Llena la información para crear una nueva clase</p>
      </div>
      <form id="subject-form" class="form">
        <div class="form-row">
          <div class="form-group">
            <label for="code">Código de Clase</label>
            <input type="text" id="code" placeholder="ejemplo: CS101" required />
          </div>
          <div class="form-group">
            <label for="name">Nombre de la Clase</label>
            <input type="text" id="name" placeholder="ejemplo: Introducción a la Programación" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="period">Valido hasta</label>
            <input type="date" id="period" required />
          </div>
          <div class="form-group">
            <label for="max_students">Cantidad Maxima de Estudiantes</label>
            <input type="number" id="max_students" placeholder="30" min="1" required />
          </div>
        </div>
        <div class="form-group">
          <label for="description">Descripción (Opcional)</label>
          <textarea id="description" placeholder="Enter class description, objectives, or notes..."></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="btn-close-modal">Cancelar</button>
          <button type="submit" id="submit-btn" class="btn-primary">
            <span class="btn-text">Crear Clase</span>
          </button>
        </div>
      </form>
    </div>
  </div>
  <div class="modal-overlay" id="share-code-modal">
    <div class="form-card">
      <div class="form-header">
        <h1 class="form-title">Código de la Clase</h1>
        <p class="form-subtitle">Comparte este código con tus estudiantes</p>
      </div>
      <div class="share-body">
        <span id="share-code-text" class="share-code"></span>
        <button class="btn-primary" id="btn-copy-code">Copiar código</button>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" id="btn-close-share-modal">Cerrar</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="join-class-modal">
    <div class="form-card">
      <div class="form-header">
        <h1 class="form-title">Unirse a una Clase</h1>
        <p class="form-subtitle">Ingresa el código que te compartió tu docente</p>
      </div>
      <div class="form">
        <div class="form-group">
          <label for="join-code">Código de clase</label>
          <input type="text" id="join-code" placeholder="ejemplo: CS101" />
        </div>
        <div class="form-actions">
          <button class="btn-secondary" id="btn-close-join-modal">Cancelar</button>
          <button class="btn-primary" id="btn-confirm-join">Unirse</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../scripts/dashboard.js"></script>
</body>
</html>
