<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profesiones</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="styles/style.css" />
</head>

<body>
  <div class="container">
    <h1>Registro</h1>

    <form id="form-profesion">
      <div class="form-group">
        <label for="nombre">Profesion</label>
        <input type="text" id="nombre" required />
      </div>
      <div class="form-group">
        <label for="posicion">posicion</label>
        <input type="number" id="posicion" min="1" required />
      </div>
      <div class="form-group">
        <label for="sueldo">Sueldo</label>
        <input type="number" id="sueldo" min="1" required />
      </div>
      <button type="submit">Registrar</button>
    </form>

    <div id="mensaje" class="mensaje oculto"></div>
  </div>

  <script src="scripts/script.js"></script>
</body>

</html>
